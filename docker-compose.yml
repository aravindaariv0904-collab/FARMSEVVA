version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: farm_seeva_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: farm_seeva
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: farm_seeva_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
