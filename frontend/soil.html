<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soil Input - Farm Seeva</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="dashboard-page">
    <nav class="nav-bar">
        <span class="logo">🌾 Farm Seeva</span>
        <div class="user-controls">
            <span id="user-phone"></span>
            <button onclick="window.location.href='dashboard.html'" class="btn-text">Dashboard</button>
            <button onclick="auth.logout()" class="btn-text logout">Logout</button>
        </div>
    </nav>
    <div class="container glass">
        <h1 data-i18n="soil_title">Soil Data Input</h1>
        <p data-i18n="soil_subtitle">Enter latest test results for recommendation</p>
        
        <form id="soil-form" class="form-grid">
            <div class="input-wrap">
                <label for="ph">pH Level</label>
                <input type="number" step="0.1" id="ph" required placeholder="6.5">
            </div>
            <div class="input-wrap">
                <label for="n">Nitrogen (N)</label>
                <input type="number" step="1" id="n" required placeholder="55">
            </div>
            <div class="input-wrap">
                <label for="p">Phosphorus (P)</label>
                <input type="number" step="1" id="p" required placeholder="25">
            </div>
            <div class="input-wrap">
                <label for="k">Potassium (K)</label>
                <input type="number" step="1" id="k" required placeholder="45">
            </div>
            <button type="submit" class="btn-primary" data-i18n="soil_btn">Save Records</button>
        </form>
        <p class="error-msg" id="soil-error"></p>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/soil.js"></script>
    <script>
        if (!localStorage.getItem('token')) { window.location.href = 'index.html'; }
    </script>
</body>
</html>
