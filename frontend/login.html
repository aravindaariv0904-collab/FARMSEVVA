<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="login_title">Farm Seeva - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="fade-in">
  <div class="auth-container">
    <div class="auth-card glass">
      <div class="logo-section">
        <span class="logo-icon">🌾</span>
        <h1 class="logo-text">Farm Seeva</h1>
      </div>

      <h1 data-i18n="login_title">Login</h1>
      <p data-i18n="login_subtitle">Enter your phone number to proceed</p>

      <form id="login-form" class="form-group">
        <div class="input-group">
          <label data-i18n="label_phone">Phone Number</label>
          <input type="tel" id="phoneNumber" placeholder="9876543210" data-i18n="placeholder_phone" required>
        </div>
        
        <button type="submit" class="btn-primary" data-i18n="btn_get_otp">Get OTP</button>
      </form>
      
      <p id="error-message" style="color: #ff4757; margin-top: 1rem; text-align: center;"></p>
    </div>
  </div>

  <script type="module">
    import i18n from './js/i18n.js';
    import auth from './js/auth.js';

    async function init() {
      await i18n.init();
      const loginForm = document.getElementById('login-form');
      const phoneNumberInput = document.getElementById('phoneNumber');
      const errorMessage = document.getElementById('error-message');

      loginForm.onsubmit = async (e) => {
        e.preventDefault();
        const phoneNumber = phoneNumberInput.value.trim();
        
        if (phoneNumber.length < 10) {
            errorMessage.innerText = i18n.t('err_invalid_phone');
            return;
        }

        try {
            const success = await auth.login(phoneNumber);
            if (success) {
                window.location.href = 'dashboard.html';
            } else {
                errorMessage.innerText = "Error encountered during login. Try again.";
            }
        } catch (error) {
            errorMessage.innerText = "Connection error. Ensure your server is running.";
        }
      };
    }

    init();
  </script>
</body>
</html>
