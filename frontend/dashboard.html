<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Farm Seeva</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="dashboard-page">
    <nav class="nav-bar">
        <span class="logo">🌾 Farm Seeva</span>
        <div class="user-controls">
            <span id="user-phone"></span>
            <button onclick="window.location.href='soil.html'" class="btn-text">Update Soil</button>
            <button onclick="auth.logout()" class="btn-text logout">Logout</button>
        </div>
    </nav>
    <div class="container glass">
        <h1 data-i18n="dashboard_title">Dashboard</h1>
        <p data-i18n="dashboard_subtitle">Current Soil & Recommended Crops</p>
        
        <div class="grid-layout">
            <div class="card glass no-border">
                <h3 data-i18n="soil_results">Latest Soil Results</h3>
                <div id="results-list" class="results-list">
                    <p data-i18n="loading">Loading...</p>
                </div>
            </div>
            <div class="card glass no-border highlight">
                <h3 data-i18n="recommendations">Recommended Crops</h3>
                <div id="crops-list" class="crops-list">
                    <p data-i18n="loading">Loading...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/soil.js"></script>
    <script src="js/crop.js"></script>
    <script>
        if (!localStorage.getItem('token')) { window.location.href = 'index.html'; }
        document.addEventListener('DOMContentLoaded', () => {
            // Fetch initial dashboard data
            soil.loadDashboard();
        });
    </script>
</body>
</html>
