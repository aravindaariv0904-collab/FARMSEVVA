<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Seeva - Login</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="login-page">
    <div class="container glass">
        <header>
            <div class="logo">🌾 Farm Seeva</div>
            <select id="lang-switch" class="btn-secondary">
                <option value="en">English</option>
                <option value="hi">हिंदी (Hindi)</option>
                <option value="ta">தமிழ் (Tamil)</option>
            </select>
        </header>

        <main id="app">
            <h1 data-i18n="login_title">Login to Terra-AI</h1>
            <p data-i18n="login_subtitle">Enter your phone number to continue</p>
            
            <form id="login-form" class="form-group">
                <div class="input-wrap">
                    <span class="icon">📱</span>
                    <input type="tel" id="phone" placeholder="9876543210" required>
                </div>
                <button type="submit" class="btn-primary" data-i18n="login_btn">Get OTP</button>
            </form>
            
            <p class="error-msg" id="login-error"></p>
        </main>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
